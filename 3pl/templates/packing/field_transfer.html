{% extends "base.html" %}
{% block title %}창고이동 스캔 — {{ app_name }}{% endblock %}
{% block breadcrumb %}
<a href="{{ url_for('packing.field_dashboard') }}">현장모드</a> &rsaquo; <span>창고이동</span>
{% endblock %}

{% block content %}
<style>
    .scan-input-lg {
        font-size: 1.5rem; padding: 0.8rem 1rem; text-align: center;
        border: 2px solid var(--border); border-radius: 10px;
    }
    .scan-input-lg:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(58,134,255,0.2); }
    .field-error-banner {
        position: fixed; top: 0; left: 0; right: 0;
        background: #ef4444; color: #fff; text-align: center;
        font-size: 1.1rem; font-weight: 600; padding: 0.8rem; z-index: 9999; display: none;
    }
    .field-error-banner.show { display: block; }
    .result-card {
        border-radius: 12px; padding: 1.2rem; margin-bottom: 0.8rem;
        border: 2px solid var(--border);
    }
    .result-card.success { border-color: #22c55e; background: rgba(34,197,94,0.05); }
    .result-card.error { border-color: #ef4444; background: rgba(239,68,68,0.05); }
    .loc-display {
        font-size: 1.8rem; font-weight: 700; letter-spacing: 1px;
        text-align: center; padding: 0.5rem; color: var(--accent);
    }
    .arrow-icon { font-size: 2rem; color: #666; }
    .sku-preview {
        padding: 1rem; border-radius: 10px; background: var(--hover);
        text-align: center; display: none;
    }
    .sku-preview.show { display: block; }
    .sku-preview .name { font-size: 1.3rem; font-weight: 700; }
    .sku-preview .stock { font-size: 1rem; color: #666; }
</style>

<div id="errorBanner" class="field-error-banner"></div>

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="page-title mb-0"><i class="bi bi-arrow-left-right me-2"></i>창고이동</h4>
    <a href="{{ url_for('packing.field_dashboard') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>현장홈
    </a>
</div>

<!-- Step 1: 상품 스캔 -->
<div class="data-card mb-3">
    <div class="p-3">
        <label class="form-label fw-semibold" style="font-size:0.85rem;">1. 상품 바코드 스캔</label>
        <input type="text" id="barcodeInput" class="form-control scan-input-lg"
               placeholder="바코드 스캔..." autofocus>
        <div id="skuPreview" class="sku-preview mt-2">
            <div class="name" id="skuName">-</div>
            <div class="stock" id="skuStock">-</div>
        </div>
    </div>
</div>

<!-- Step 2: 출발/도착 로케이션 -->
<div class="data-card mb-3">
    <div class="p-3">
        <label class="form-label fw-semibold" style="font-size:0.85rem;">2. 출발 로케이션</label>
        <select id="fromLocation" class="form-select mb-2" style="font-size:1.1rem;">
            <option value="">출발 위치 선택</option>
            {% for loc in locations %}
            <option value="{{ loc.id }}">{{ loc.display }}</option>
            {% endfor %}
        </select>

        <div class="text-center my-2"><i class="bi bi-arrow-down arrow-icon"></i></div>

        <label class="form-label fw-semibold" style="font-size:0.85rem;">3. 도착 로케이션</label>
        <select id="toLocation" class="form-select" style="font-size:1.1rem;">
            <option value="">도착 위치 선택</option>
            {% for loc in locations %}
            <option value="{{ loc.id }}">{{ loc.display }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<!-- Step 3: 수량 + 실행 -->
<div class="data-card mb-3">
    <div class="p-3">
        <div class="row g-2 align-items-end">
            <div class="col-5">
                <label class="form-label fw-semibold" style="font-size:0.85rem;">4. 수량</label>
                <input type="number" id="qtyInput" class="form-control" value="1" min="1" style="font-size:1.3rem; text-align:center;">
            </div>
            <div class="col-7">
                <button id="transferBtn" class="btn btn-warning btn-lg w-100" onclick="processTransfer()">
                    <i class="bi bi-arrow-left-right me-1"></i>이동 실행
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 결과 -->
<div id="resultArea"></div>

<!-- 이력 -->
<div class="data-card">
    <div class="data-card-header"><h6 class="mb-0">이동 이력</h6>
        <span id="sessionCount" class="badge bg-warning text-dark">0</span>
    </div>
    <div id="historyArea" class="p-3" style="max-height:250px; overflow-y:auto;">
        <div class="text-center text-muted py-3">아직 이동 내역이 없습니다</div>
    </div>
</div>

<script>
let sessionHistory = [];

// 바코드 입력 → SKU 조회
document.getElementById('barcodeInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        lookupSku();
    }
});

function lookupSku() {
    const barcode = document.getElementById('barcodeInput').value.trim();
    if (!barcode) return;

    const fromLoc = document.getElementById('fromLocation').value;

    fetch('/packing/api/field/sku-lookup', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ barcode, location_id: fromLoc || null })
    })
    .then(r => r.json())
    .then(data => {
        const preview = document.getElementById('skuPreview');
        if (data.ok) {
            document.getElementById('skuName').textContent = data.sku_name;
            let stockText = `전체 재고: ${data.total_stock}개`;
            if (fromLoc && data.stock_qty !== undefined) {
                stockText += ` | 출발위치: ${data.stock_qty}개`;
            }
            document.getElementById('skuStock').textContent = stockText;
            preview.classList.add('show');
            playSuccess();
        } else {
            preview.classList.remove('show');
            playError();
            showError(data.error);
        }
    })
    .catch(() => { playError(); showError('네트워크 오류'); });
}

function processTransfer() {
    const barcode = document.getElementById('barcodeInput').value.trim();
    const fromLoc = document.getElementById('fromLocation').value;
    const toLoc = document.getElementById('toLocation').value;
    const qty = parseInt(document.getElementById('qtyInput').value) || 1;

    if (!barcode) { showError('상품 바코드를 스캔해주세요.'); return; }
    if (!fromLoc) { showError('출발 로케이션을 선택해주세요.'); return; }
    if (!toLoc) { showError('도착 로케이션을 선택해주세요.'); return; }

    document.getElementById('transferBtn').disabled = true;

    fetch('/packing/api/field/transfer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ barcode, from_location_id: fromLoc, to_location_id: toLoc, quantity: qty })
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('transferBtn').disabled = false;
        if (data.ok) {
            playSuccess();
            showResult(true, `${data.sku_name} ${qty}개 이동 완료`);
            addHistory(data.sku_name, data.sku_code, qty);
            document.getElementById('barcodeInput').value = '';
            document.getElementById('skuPreview').classList.remove('show');
            document.getElementById('qtyInput').value = '1';
            document.getElementById('barcodeInput').focus();
        } else {
            playError();
            showError(data.error);
            showResult(false, data.error);
        }
    })
    .catch(() => {
        document.getElementById('transferBtn').disabled = false;
        playError(); showError('네트워크 오류');
    });
}

function showResult(ok, msg) {
    const area = document.getElementById('resultArea');
    area.innerHTML = `<div class="result-card ${ok?'success':'error'}">
        <div class="d-flex align-items-center">
            <i class="bi ${ok?'bi-check-circle-fill text-success':'bi-x-circle-fill text-danger'}" style="font-size:1.5rem;"></i>
            <span class="ms-2" style="font-size:1.1rem; font-weight:600;">${msg}</span>
        </div>
    </div>`;
    setTimeout(() => { area.innerHTML = ''; }, 4000);
}

function addHistory(name, code, qty) {
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    sessionHistory.unshift({ name, code, qty, time });
    document.getElementById('sessionCount').textContent = sessionHistory.length;
    const area = document.getElementById('historyArea');
    area.innerHTML = sessionHistory.map(h =>
        `<div style="padding:0.4rem 0; border-bottom:1px solid var(--border); font-size:0.85rem;">
            <strong>${h.name}</strong> <small class="text-muted">(${h.code})</small>
            — <span class="fw-bold">${h.qty}</span>개 <small class="text-muted">${h.time}</small>
        </div>`
    ).join('');
}

function showError(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent = msg; b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 3000);
}
function playSuccess() {
    try { const c=new AudioContext(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';g.gain.value=0.15;o.start();o.stop(c.currentTime+0.12); } catch(e){}
}
function playError() {
    try { const c=new AudioContext(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=300;o.type='square';g.gain.value=0.2;o.start();o.stop(c.currentTime+0.3); } catch(e){}
}

document.addEventListener('click', e => {
    if (!e.target.closest('select, input, button, a')) document.getElementById('barcodeInput').focus();
});
document.addEventListener('DOMContentLoaded', () => document.getElementById('barcodeInput').focus());
</script>
{% endblock %}
